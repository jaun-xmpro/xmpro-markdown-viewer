<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XMPro Markdown Viewer (preview)</title>
    <!--
        Thin wrapper that mimics what XMPro App Designer does in production:
        load main.css, inject main.html body content, then load main.js.

        The metablock files themselves (../metablock/*) reference NO local
        resources by design — XMPro handles linking them. This wrapper does
        the equivalent linking so we can preview the metablock locally
        without modifying the production-bound files.
    -->
    <link rel="stylesheet" href="../metablock/main.css">
    <style>
        html, body { margin: 0; padding: 0; height: 100%; background: transparent; }
    </style>
</head>
<body>
<script>
(async function bootMetablock() {
    function loadScript(src) {
        return new Promise((resolve, reject) => {
            const s = document.createElement('script');
            s.src = src;
            s.async = false;
            s.onload = () => resolve(src);
            s.onerror = () => reject(new Error('Failed to load ' + src));
            document.head.appendChild(s);
        });
    }

    try {
        const res = await fetch('../metablock/main.html', { cache: 'no-cache' });
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const html = await res.text();

        const tpl = document.createElement('template');
        tpl.innerHTML = html;

        // Move <style> blocks from main.html to <head>
        tpl.content.querySelectorAll('style').forEach(s => {
            const ns = document.createElement('style');
            if (s.id) ns.id = s.id;
            ns.textContent = s.textContent;
            document.head.appendChild(ns);
            s.remove();
        });

        // Collect external <script src> sources in order; remove them from template
        const scriptSrcs = [];
        tpl.content.querySelectorAll('script').forEach(s => {
            if (s.src) scriptSrcs.push(s.src);
            s.remove();
        });

        // Move remaining body content (the .viewer-root structure) into body
        while (tpl.content.firstChild) {
            document.body.appendChild(tpl.content.firstChild);
        }

        // Load scripts sequentially to preserve dependency order
        for (const src of scriptSrcs) {
            await loadScript(src);
        }

        // Finally load the metablock's main.js (the equivalent of XMPro's
        // Script File upload)
        await loadScript('../metablock/main.js');
    } catch (err) {
        document.body.innerHTML = `
            <div style="padding:2rem;font-family:system-ui;color:#a00;">
                <h2>Failed to boot metablock preview</h2>
                <pre>${err.stack || err.message}</pre>
            </div>`;
    }
})();
</script>
</body>
</html>
